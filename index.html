<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Stato Server Ardlasur</title>
    <style>
        .online { color: green; }
        .offline { color: red; }
        #motd { font-family: monospace; background: #222; color: #fff; padding: 10px; display: inline-block; }
    </style>
</head>
<body>
    <h1>Monitoraggio Server</h1>
    <div id="status-container">
        <p>Stato: <span id="status-text">Caricamento...</span></p>
        <p>Giocatori: <span id="player-count">-</span> / <span id="max-players">-</span></p>
        <p>Versione: <span id="version">-</span></p>
        <div id="motd"></div>
    </div>

    <script src="status.js"></script>
</body>
</html>
